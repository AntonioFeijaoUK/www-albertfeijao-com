<div class="story-card">
  {% if story.cover %}
    <a href="{{ story.url | relative_url }}" class="story-card-image-link">
      <img
        src="{{ story.cover | relative_url }}"
        alt="Cover image for {{ story.title }}"
        class="story-card-image">
    </a>
  {% endif %}

  <div class="story-card-content">
    <h2 class="story-card-title">
      <a href="{{ story.url | relative_url }}">{{ story.title }}</a>
    </h2>

    {% if story.excerpt %}
      <p class="story-card-excerpt">{{ story.excerpt }}</p>
    {% endif %}

    <p class="story-card-meta">
      {% if story.date %}Published: {{ story.date | date: "%-d %B %Y" }}{% endif %}
    </p>

    <p class="story-card-link">
      <a href="{{ story.url | relative_url }}">Read story</a>
    </p>
  </div>
</div>
