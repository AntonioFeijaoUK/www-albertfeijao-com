title: "Albert Feijao stories"
description: "Stories from a young imagination"

url: "https://www.albertfeijao.com"
baseurl: ""

locale: en_GB

markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-seo-tag

collections:
  stories:
    output: true
    permalink: /stories/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: default

  - scope:
      path: ""
      type: "stories"
    values:
      layout: default

# SEO / metadata improvements
author: "Albert Feijao"
twitter:
  card: summary

exclude:
  - README.md
  - LICENSE
