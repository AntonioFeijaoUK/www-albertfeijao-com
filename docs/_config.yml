title: "Albert Feijao Stories"
description: "Stories from a young imagination"
theme: jekyll-theme-midnight

# If using a custom domain such as www.albertfeijao.com
# keep baseurl empty.
url: "https://www.albertfeijao.com"
baseurl: ""

markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - README.md
  - LICENSE
