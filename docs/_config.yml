title: "Albert Feijao stories"
description: "Stories from a young imagination"

theme: jekyll-theme-midnight

url: "https://www.albertfeijao.com"
baseurl: ""

markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-seo-tag

collections:
  stories:
    output: true
    permalink: /stories/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: default

  - scope:
      path: ""
      type: "stories"
    values:
      layout: default

exclude:
  - README.md
  - LICENSE
